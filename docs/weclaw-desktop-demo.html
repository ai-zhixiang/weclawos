<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微侠桌面</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  @font-face {
    font-family: 'System';
    src: local('PingFang SC'), local('Noto Sans SC'), local('Microsoft YaHei'), local('sans-serif');
  }

  body {
    font-family: 'System', sans-serif;
    background: #0a0a0c;
    color: #fff;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  /* ===== 全屏背景 ===== */
  .screen {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
    background: radial-gradient(ellipse at 50% 30%, #1a1a2e 0%, #0a0a0c 70%);
  }

  /* 微妙的动态背景纹理 */
  .screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(circle at 20% 80%, rgba(100, 160, 255, 0.03) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(255, 200, 100, 0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ===== 顶部状态栏 ===== */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 48px 0;
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.5px;
    z-index: 2;
  }
  .status-bar .time {
    font-size: 16px;
    font-weight: 500;
    color: rgba(255,255,255,0.6);
  }
  .status-bar .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ade80;
    margin-right: 6px;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .status-bar .right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* ===== 中间主区域 ===== */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
    z-index: 2;
    transition: all 0.5s ease;
  }

  /* ===== 时钟（待机状态） ===== */
  .clock {
    font-size: 96px;
    font-weight: 300;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.9);
    margin-bottom: 12px;
    transition: all 0.5s ease;
    font-variant-numeric: tabular-nums;
  }
  .clock-date {
    font-size: 18px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 2px;
    margin-bottom: 40px;
  }

  /* ===== 语音提示 ===== */
  .prompt {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    opacity: 0.6;
    transition: all 0.3s ease;
  }
  .prompt.active {
    opacity: 1;
  }
  .prompt .mic-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .prompt .mic-icon.listening {
    border-color: #f97316;
    box-shadow: 0 0 30px rgba(249, 115, 22, 0.3);
    animation: mic-pulse 1.5s ease-in-out infinite;
  }
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(249, 115, 22, 0.2); }
    50% { box-shadow: 0 0 40px rgba(249, 115, 22, 0.5); }
  }
  .prompt .hint {
    font-size: 16px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }

  /* ===== 波形动画 ===== */
  .waveform {
    display: none;
    align-items: center;
    gap: 3px;
    height: 40px;
    margin: 10px 0;
  }
  .waveform.active {
    display: flex;
  }
  .waveform .bar {
    width: 4px;
    background: linear-gradient(to top, #f97316, #fb923c);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite alternate;
  }
  .waveform .bar:nth-child(1) { height: 12px; animation-delay: 0s; }
  .waveform .bar:nth-child(2) { height: 24px; animation-delay: 0.1s; }
  .waveform .bar:nth-child(3) { height: 36px; animation-delay: 0.2s; }
  .waveform .bar:nth-child(4) { height: 18px; animation-delay: 0.3s; }
  .waveform .bar:nth-child(5) { height: 30px; animation-delay: 0.4s; }
  .waveform .bar:nth-child(6) { height: 40px; animation-delay: 0.15s; }
  .waveform .bar:nth-child(7) { height: 20px; animation-delay: 0.25s; }
  .waveform .bar:nth-child(8) { height: 32px; animation-delay: 0.35s; }
  @keyframes wave {
    0% { transform: scaleY(0.4); }
    100% { transform: scaleY(1); }
  }

  /* ===== 对话区域 ===== */
  .chat-area {
    position: absolute;
    bottom: 140px;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    max-width: 800px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .chat-area.active {
    display: flex;
  }

  .chat-bubble {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 24px 32px;
    font-size: 22px;
    line-height: 1.6;
    text-align: center;
    max-width: 100%;
    animation: bubble-in 0.4s ease-out;
    color: rgba(255,255,255,0.9);
    font-weight: 300;
    letter-spacing: 0.5px;
  }
  @keyframes bubble-in {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ===== 底部播放控制条 ===== */
  .player-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 48px 32px;
    background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
    display: none;
    align-items: center;
    gap: 24px;
    z-index: 2;
  }
  .player-bar.active {
    display: flex;
  }
  .player-bar .cover {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    background: linear-gradient(135deg, #f97316, #d946ef);
    flex-shrink: 0;
  }
  .player-bar .info {
    flex: 1;
    min-width: 0;
  }
  .player-bar .info .title {
    font-size: 15px;
    color: rgba(255,255,255,0.9);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-bar .info .artist {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
  }
  .player-bar .progress {
    width: 200px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .player-bar .progress .fill {
    width: 35%;
    height: 100%;
    background: linear-gradient(to right, #f97316, #fb923c);
    border-radius: 2px;
  }
  .player-bar .controls {
    display: flex;
    gap: 16px;
    color: rgba(255,255,255,0.6);
    font-size: 20px;
  }
  .player-bar .controls span {
    cursor: pointer;
    transition: color 0.2s;
  }
  .player-bar .controls span:hover { color: #fff; }
  .player-bar .controls .play-btn {
    color: #fff;
    font-size: 24px;
  }

  /* ===== 功能图标 ===== */
  .quick-actions {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 32px;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .quick-actions.show {
    opacity: 0.5;
  }
  .quick-actions .action {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    transition: all 0.2s;
    padding: 8px 16px;
    border-radius: 12px;
  }
  .quick-actions .action:hover {
    opacity: 1;
    background: rgba(255,255,255,0.05);
  }
  .quick-actions .action .icon {
    font-size: 24px;
  }

  /* ===== 状态指示 ===== */
  .state-label {
    font-size: 13px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 1px;
    margin-top: 8px;
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
  }

  /* ===== 右上角小菜单图标 ===== */
  .menu-trigger {
    position: absolute;
    top: 28px;
    right: 48px;
    color: rgba(255,255,255,0.2);
    font-size: 18px;
    cursor: pointer;
    z-index: 3;
    transition: color 0.2s;
  }
  .menu-trigger:hover { color: rgba(255,255,255,0.5); }

  /* ===== 响应式 ===== */
  @media (max-width: 768px) {
    .clock { font-size: 64px; }
    .chat-area { width: 85%; bottom: 120px; }
    .chat-bubble { font-size: 18px; padding: 18px 24px; }
    .player-bar { padding: 16px 20px 24px; }
    .player-bar .progress { width: 100px; }
    .quick-actions { gap: 16px; }
  }
</style>
</head>
<body>

<div class="screen">

  <!-- 状态栏 -->
  <div class="status-bar">
    <div class="time" id="clockDisplay">00:00</div>
    <div class="right">
      <span><span class="status-dot"></span>微侠在线</span>
      <span style="opacity:0.4">|</span>
      <span>🎤 语音已开启</span>
    </div>
  </div>

  <!-- 右上菜单占位 -->
  <div class="menu-trigger">⚙</div>

  <!-- ===== 主区域 ===== -->
  <div class="main-area">

    <!-- 时钟（待机态） -->
    <div class="clock" id="bigClock">00:00</div>
    <div class="clock-date" id="dateDisplay">2026年7月13日 · 星期二</div>

    <!-- 语音提示 -->
    <div class="prompt" id="promptArea">
      <div class="mic-icon" id="micBtn">🎤</div>
      <div class="hint">说"你好微侠"开始对话</div>
    </div>

    <!-- 波形 -->
    <div class="waveform" id="waveform">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>

    <!-- 对话气泡 -->
    <div class="chat-area" id="chatArea">
      <div class="chat-bubble" id="chatBubble"></div>
    </div>
  </div>

  <!-- 底部功能图标 -->
  <div class="quick-actions show" id="quickActions">
    <div class="action" onclick="simulateCommand('放点音乐')">
      <span class="icon">🎵</span>
      <span>听歌</span>
    </div>
    <div class="action" onclick="simulateCommand('播个电影')">
      <span class="icon">🎬</span>
      <span>看视频</span>
    </div>
    <div class="action" onclick="simulateCommand('读这个文件')">
      <span class="icon">📖</span>
      <span>有声书</span>
    </div>
    <div class="action" onclick="simulateCommand('今天有什么新闻')">
      <span class="icon">📰</span>
      <span>查信息</span>
    </div>
    <div class="action" onclick="simulateCommand('帮我写首歌')">
      <span class="icon">✍️</span>
      <span>AI写歌</span>
    </div>
  </div>

  <!-- 底部播放条 -->
  <div class="player-bar" id="playerBar">
    <div class="cover"></div>
    <div class="info">
      <div class="title">稻香</div>
      <div class="artist">周杰伦</div>
    </div>
    <div class="progress"><div class="fill"></div></div>
    <div class="controls">
      <span>⏮</span>
      <span class="play-btn">▶</span>
      <span>⏭</span>
    </div>
  </div>

  <!-- 状态文字 -->
  <div class="state-label" id="stateLabel">说出你的需求</div>

</div>

<script>
  // ===== 时钟 =====
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const time = h + ':' + m;
    document.getElementById('clockDisplay').textContent = time;
    document.getElementById('bigClock').textContent = time;

    const days = ['日', '一', '二', '三', '四', '五', '六'];
    const d = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 · 星期' + days[now.getDay()];
    document.getElementById('dateDisplay').textContent = d;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ===== 状态管理 =====
  let state = 'idle'; // idle | listening | thinking | speaking | playing

  function setState(newState, responseText) {
    state = newState;
    const prompt = document.getElementById('promptArea');
    const waveform = document.getElementById('waveform');
    const chatArea = document.getElementById('chatArea');
    const mic = document.getElementById('micBtn');
    const label = document.getElementById('stateLabel');
    const actions = document.getElementById('quickActions');

    prompt.classList.remove('active');
    waveform.classList.remove('active');
    chatArea.classList.remove('active');

    switch(newState) {
      case 'idle':
        prompt.classList.add('active');
        mic.className = 'mic-icon';
        label.textContent = '说出你的需求';
        actions.classList.add('show');
        break;
      case 'listening':
        prompt.classList.add('active');
        mic.className = 'mic-icon listening';
        waveform.classList.add('active');
        label.textContent = '正在聆听...';
        actions.classList.remove('show');
        break;
      case 'thinking':
        prompt.classList.remove('active');
        mic.className = 'mic-icon';
        label.textContent = '微侠思考中...';
        break;
      case 'speaking':
        if (responseText) {
          chatArea.classList.add('active');
          document.getElementById('chatBubble').textContent = responseText;
        }
        label.textContent = '';
        break;
    }
  }

  // ===== 模拟语音命令 =====
  function simulateCommand(cmd) {
    setState('listening');
    setTimeout(() => {
      setState('thinking');
      setTimeout(() => {
        const responses = {
          '放点音乐': '🎵 正在为你播放推荐歌单\n《稻香》— 周杰伦',
          '播个电影': '🎬 找到《让子弹飞》\n准备播放...',
          '读这个文件': '📖 找到你手机同步的《百年孤独》\n从上次读到的地方继续',
          '今天有什么新闻': '📰 今天主要新闻：\n1. 国内AI产业持续升温\n2. 半导体供应链新动态\n3. 新能源车销量再创新高',
          '帮我写首歌': '✍️ 你想要什么主题和风格？\n说"夏天的微风"这样一句话就行',
        };
        const reply = responses[cmd] || '好的，已收到你的指令';
        setState('speaking', reply);
        setTimeout(() => setState('idle'), 4000);
      }, 1500);
    }, 2000);
  }

  // ===== 点击麦克风模拟 =====
  document.getElementById('micBtn').addEventListener('click', () => {
    if (state === 'idle') {
      setState('listening');
      setTimeout(() => {
        setState('thinking');
        setTimeout(() => {
          setState('speaking', '你好！我是微侠，有什么可以帮你的？\n听歌、看视频、查信息，都可以跟我说');
          // 模拟自动回待机
          setTimeout(() => setState('idle'), 5000);
        }, 1500);
      }, 2500);
    }
  });

  // ===== 键盘快捷键（demo用） =====
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && state === 'idle') {
      document.getElementById('micBtn').click();
    }
  });

  // ===== 初始状态 =====
  setState('idle');

  // ===== 模拟播放条 =====
  setTimeout(() => {
    document.getElementById('playerBar').classList.add('active');
  }, 3000);
</script>
</body>
</html>
